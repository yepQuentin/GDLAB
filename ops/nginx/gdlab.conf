# Main domain
server {
  listen 80;
  listen [::]:80;
  server_name gdlab.goerdynamics.com;

  location /.well-known/acme-challenge/ {
    root /var/www/html;
  }

  location / {
    return 301 https://gdlab.goerdynamics.com$request_uri;
  }
}

# www -> main domain
server {
  listen 80;
  listen [::]:80;
  server_name www.gdlab.goerdynamics.com;

  location /.well-known/acme-challenge/ {
    root /var/www/html;
  }

  location / {
    return 301 https://gdlab.goerdynamics.com$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name gdlab.goerdynamics.com;

  ssl_certificate /etc/letsencrypt/live/gdlab.goerdynamics.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/gdlab.goerdynamics.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  client_max_body_size 20m;

  # Internal-only cache revalidation endpoint.
  location = /api/internal/revalidate {
    allow 127.0.0.1;
    allow ::1;
    deny all;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_pass http://127.0.0.1:3000;
  }

  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_pass http://127.0.0.1:3000;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name www.gdlab.goerdynamics.com;

  ssl_certificate /etc/letsencrypt/live/gdlab.goerdynamics.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/gdlab.goerdynamics.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  location / {
    return 301 https://gdlab.goerdynamics.com$request_uri;
  }
}
